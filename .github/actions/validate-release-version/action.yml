name: Validate Release Version
description: Validate tag/ref commit identity plus workspace, frontend package, Tauri package, and release config version consistency.

inputs:
  tag:
    description: Release tag
    required: true
  ref:
    description: Git ref expected to resolve to the same commit as the release tag
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Validate tag/version consistency
      shell: pwsh
      run: ./scripts/release/assert-release-version.ps1 -Tag "${{ inputs.tag }}"

    - name: Validate tag/ref commit consistency
      if: ${{ inputs.ref != '' }}
      shell: pwsh
      run: |
        $tag = "${{ inputs.tag }}"
        if (-not $tag.StartsWith('v')) {
          $tag = "v$tag"
        }

        $ref = "${{ inputs.ref }}"

        git fetch --force --tags origin | Out-Null

        $refSha = ((git rev-parse --verify "$ref^{commit}") 2>$null) -join ""
        if ([string]::IsNullOrWhiteSpace($refSha)) {
          throw "cannot resolve ref to commit: $ref"
        }

        $tagSha = ((git rev-parse --verify "refs/tags/$tag^{commit}") 2>$null) -join ""
        if ([string]::IsNullOrWhiteSpace($tagSha)) {
          throw "cannot resolve tag to commit: $tag"
        }

        if ($refSha -ne $tagSha) {
          throw "ref/tag mismatch: ref=$ref ($refSha) tag=$tag ($tagSha)"
        }

        Write-Host "Ref/tag OK: $ref -> $refSha matches $tag"
