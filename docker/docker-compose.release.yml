services:
  codexmanager-service:
    image: ghcr.io/${CODEXMANAGER_IMAGE_OWNER:-yanzhi0922}/codexmanager-service:${CODEXMANAGER_RELEASE_TAG:?set CODEXMANAGER_RELEASE_TAG}
    restart: unless-stopped
    environment:
      CODEXMANAGER_SERVICE_ADDR: 0.0.0.0:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
    volumes:
      - codexmanager-data:/data
    ports:
      - "48760:48760"

  codexmanager-web:
    image: ghcr.io/${CODEXMANAGER_IMAGE_OWNER:-yanzhi0922}/codexmanager-web:${CODEXMANAGER_RELEASE_TAG:?set CODEXMANAGER_RELEASE_TAG}
    restart: unless-stopped
    depends_on:
      codexmanager-service:
        condition: service_healthy
    environment:
      CODEXMANAGER_WEB_ADDR: 0.0.0.0:48761
      CODEXMANAGER_WEB_NO_SPAWN_SERVICE: "1"
      CODEXMANAGER_SERVICE_ADDR: codexmanager-service:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_WEB_NO_OPEN: "1"
    volumes:
      - codexmanager-data:/data
    ports:
      - "48761:48761"

volumes:
  codexmanager-data:
